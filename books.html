<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books We Love | TLS Student Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="shimmer-background"></div>

    <header class="main-header">
        <a href="index.html" class="back-link">← Return to Hub</a>
        <h1 class="title-reveal">BOOKS WE LOVE</h1>
        <br><p class="tagline"> A collection of all the book reviews by TLS students .</p>
        <div class="header-line"></div>
    </header>

    <main class="books-container">
        
        <div class="book-row" style="--i:1">
            <div class="book-frame book-cover">
                <img src="images/book1.jpg" alt="Book Cover 1">
                <span class="label">Piranesi</span>
            </div>
            <div class="book-frame book-review">
                <img src="images/review1.jpg" alt="Student Review 1">
                <span class="label">TLS Review</span>
            </div>
        </div>

        <div class="book-row" style="--i:2">
            <div class="book-frame book-cover">
                <img src="images/book2.jpg" alt="Book Cover 2">
                <span class="label">1984</span>
            </div>
            <div class="book-frame book-review">
                <img src="images/review2.jpg" alt="Student Review 2">
                <span class="label">TLS Review</span>
            </div>
        </div>

        <div class="book-row" style="--i:3">
            <div class="book-frame book-cover">
                <img src="images/book3.jpg" alt="Book Cover 3">
                <span class="label">Book sample</span>
            </div>
            <div class="book-frame book-review">
                <img src="images/review3.jpg" alt="Student Review 3">
                <span class="label">TLS Review</span>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
