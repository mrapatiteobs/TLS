<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes | TLS Student Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="shimmer-background"></div>

    <header class="main-header">
        <a href="index.html" class="back-link">← Return to Hub</a>
        <h1 class="title-reveal">Quotes</h1>
        <br><p class="tagline">A collection our favourite quotes</p>
        <div class="header-line"></div>
    </header>

    <main class="books-container">
        
        <div class="book-row" style="--i:1">
            <div class="book-frame book-cover">
                <img src="images/quote1.jpg" alt="student's handwritten quotes">
                <span class="label">quote sample</span>
            </div>
            <div class="book-frame book-review">
                <img src="images/quote2.jpg" alt="student's handwritten quotes">
                <span class="label">quote sample 2</span>
            </div>
        </div>

        <div class="book-row" style="--i:2">
            <div class="book-frame book-cover">
                <img src="images/quote3.jpg" alt="student's handwritten quotes">
                <span class="label">quote sample 3</span>
            </div>
            <div class="book-frame book-review">
                <img src="images/quote4.jpg" alt="student's handwritten quotes">
                <span class="label">quote 4</span>
            </div>
        </div>

        <div class="book-row" style="--i:3">
            <div class="book-frame book-cover">
                <img src="images/quote5.jpg" alt="student's handwritten quotes">
                <span class="label">quote 5</span>
            </div>
            <div class="book-frame book-review">
                <img src="images/quote6.jpg" alt="student's handwritten quotes">
                <span class="label">quote 6</span>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
