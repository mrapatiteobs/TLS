<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLS Librarian Board | Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stars-background"></div>

    <header class="main-header">
        <h1 class="title-reveal">TLS LIBRARIAN BOARD</h1>
        <div class="scanline"></div>

    <main class="hub-container">
        <a href="books.html" class="hub-card" style="--i:1">

            <div class="card-overlay"></div>
            <h2 class="card-text">Books We Love</h2>
        </a>

        <a href="quotes.html" class="hub-card" style="--i:2">

            <div class="card-overlay"></div>

        </a>

        <a href="history.html" class="hub-card" style="--i:3">
            <div class="card-image" style="background-image: url('images/pic3.png');"></div>
            <div class="card-overlay"></div>
            <h2 class="card-text">Today in History</h2>
        </a>

        <a href="meetus.html" class="hub-card" style="--i:4">
            <div class="card-image" style="background-image: url('images/pic4.png');"></div>
            <div class="card-overlay"></div>

    <script src="script.js"></script>
