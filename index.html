<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLS Student Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="shimmer-background"></div>

    <header class="main-header">
        <div class="title-container">
            <img src="images/logo1.png" alt="TLS Logo" class="header-logo">
            <h1 class="title-reveal">TLS Student Showcase</h1>
        </div>
             <p class="mission-statement">
         a student run initiative to showcase the works and arts of the TLS community
        </p>
        <div class="header-line"></div>
    </header>

    <main class="hub-container">
        <a href="books.html" class="hub-card pastel-blue" style="--i:1">
            <div class="card-image" style="background-image: url('images/pic1.jpg');"></div>
            <div class="card-overlay"></div>
            <h2 class="card-text">Books We Love</h2>
        </a>

        <a href="quotes.html" class="hub-card pastel-pink" style="--i:2">
            <div class="card-image" style="background-image: url('images/pic2.jpg');"></div>
            <div class="card-overlay"></div>
            <h2 class="card-text">Quotes</h2>
        </a>

        <a href="art.html" class="hub-card pastel-green" style="--i:3">
            <div class="card-image" style="background-image: url('images/pic5.jpg');"></div>
            <div class="card-overlay"></div>
            <h2 class="card-text">Art Gallery</h2>
        </a>

        <a href="meet.html" class="hub-card pastel-purple" style="--i:4">
            <div class="card-image" style="background-image: url('images/pic4.jpg');"></div>
            <div class="card-overlay"></div>
            <h2 class="card-text">Meet Us</h2>
        </a>
    </main>
<footer class="main-footer">
        <p>an initiative by Tan Sebastian</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
    <script src="script.js"></script>
</body>
</html>
